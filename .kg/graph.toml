schema_version = 1

[nodes.aad-bound-to-name]
kind = "Decision"
title = "AAD bound to full project prefix (name-metadata), not just name"
body = """
Use deaddrop-crypto's `encrypt_chunk(drop_uuid, chunk_index, bytes)` with `drop_uuid = "{name}-{metadata}"` and `chunk_index = 0`. AAD = `b"deaddrop:chunk:{name}-{metadata}:0"`.

(Slug is historical — originally just `name`; widened to the full prefix when `metadata` was introduced. See [[identity-name-and-metadata]].)

**Why:** Binds the ciphertext to the *full* project identity, not just the logical service name. A backup blob for `api-prod-web01` literally cannot be decrypted as `api-staging-web01` even if dropped into the wrong S3 prefix or fed to the wrong restore invocation — the AAD mismatch fails the AES-GCM tag check. Without this widening, two projects sharing a `name` but differing in `metadata` would have interchangeable ciphertext.

**How to apply:** Any future encrypt/decrypt path MUST pass the full `project_prefix(cfg)` string, not `cfg.name`. If we ever add a `--force-name` style override that lets you decrypt across identity boundaries, do it by allowing the operator to pass an explicit AAD string — don't loosen the default. Don't switch to `encrypt_metadata` "to simplify" — you'd lose the binding entirely (it uses a static AAD).
"""
created_at = 1779946345
updated_at = 1780031340

[[nodes.aad-bound-to-name.anchors]]
