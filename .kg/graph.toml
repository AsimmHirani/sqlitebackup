[nodes.in-memory-only]
kind = "Gotcha"
title = "Whole dump + gzip + ciphertext buffered in RAM"
body = """
The pipeline buffers the entire compressed SQL dump as a `Vec<u8>` before encrypting, then buffers the entire envelope before PutObject. Peak memory ≈ 2× compressed dump size.

**Why:** Good enough for small operational DBs (single-digit MB compressed). Avoids the complexity of streaming AEAD (multi-chunk with monotonic indices) and S3 multipart upload.

**How to apply:** If you enroll a new project whose `.dump` output is hundreds of MB compressed, this becomes a real constraint. The refactor: switch to multi-chunk `encrypt_chunk(name, i, ...)` for i=0..N, ship them as parts of an S3 multipart upload, and bump the envelope version. Do NOT silently switch to streaming with the same envelope version — restore tools relying on v1 will break.
"""
created_at = 1779946359
updated_at = 1779946359

[[nodes.in-memory-only.anchors]]
path = "src/main.rs"
symbol = "dump_and_compress"

[nodes.isbk1-envelope]
kind = "Decision"
title = "ISBK1 envelope wraps ciphertext with salt + Argon2 params"
body = """
On-disk format is a custom binary envelope; the deaddrop-crypto ciphertext alone is not self-describing enough to decrypt later.

Layout (all multi-byte LE):
  [4]  magic "ISBK"
  [1]  version (=1)
  [1]  salt_len (=16)
  [16] salt
  [4]  argon2 m_cost
  [4]  argon2 t_cost
  [4]  argon2 p_cost
  [..] deaddrop-crypto ciphertext (nonce(12) | cipher | tag(16))

**Why:** deaddrop-crypto's ciphertext layout (nonce|ct|tag) doesn't carry the Argon2 salt or cost params — its original calling context kept them in a server-side DB row. For a standalone backup file we have to ship them inline so the restore tool can derive the same key. Version byte lets us evolve (e.g. switch to chunked encryption for huge DBs) without ambiguity.

**How to apply:** Restore tool MUST validate magic + version before parsing. Bumping the version means restore must support both old and new for as long as historical backups need to be recoverable. Don't pull fields out of the envelope (e.g. "salt is always at offset N") — go through a parser.
"""
created_at = 1779946353
updated_at = 1779946353

