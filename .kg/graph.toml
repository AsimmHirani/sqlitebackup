[nodes.systemd-install-shape]
kind = "Decision"
title = "systemd timer install: sh -c wrapper for .env, OnUnitActiveSec, /etc/systemd/system"
body = """
`sqlitebackup backup --install-systemd <INTERVAL>` writes two units to `/etc/systemd/system/`:
- `sqlitebackup-{prefix}.service` (Type=oneshot, runs the backup once)
- `sqlitebackup-{prefix}.timer` (OnBootSec=15min, OnUnitActiveSec={INTERVAL}, Persistent=true)

ExecStart uses a `/bin/sh -c '...'` wrapper rather than systemd's native `EnvironmentFile=`.

**Why:**
1. *sh wrapper over EnvironmentFile=.* `EnvironmentFile=` only accepts bare `KEY=VALUE` lines — it rejects/silently-misparses the `export KEY=VALUE` form most operators use in `.env` files (because the same file gets manually `source`'d during ad-hoc invocations). One file, two consumers, no maintenance drift.
2. *System units over user units.* The tool typically backs up root-owned DBs (e.g. `/var/lib/myapp/database.db`). Running as user would require either making the DB world-readable or duplicating ownership. System mode keeps the security boundary at root.
3. *OnUnitActiveSec + OnBootSec + Persistent.* `OnUnitActiveSec` is interval-from-last-run (predictable cadence). `OnBootSec=15min` avoids hammering on cold boot. `Persistent=true` runs a missed backup on next boot if the machine was off when the timer would have fired.
4. *Prints units before writing.* The full content of both files goes to stderr before the write attempt, so an operator hitting `Permission denied` (i.e. forgot `sudo`) already has the content they'd need to install manually.

**How to apply:** Use the same shell wrapper if you ever add a peer command (e.g. a periodic verify/prune). If you switch to `EnvironmentFile=`, you'll need a `.env.systemd` companion file and a way to keep it in sync — don't do that silently. Interval validation is delegated to systemd at unit-load time (run `systemd-analyze timespan <INTERVAL>` to pre-check). Calendar-style schedules (e.g. `*-*-* 03:00:00`) are not supported by this flag — operators wanting them edit the generated `.timer` and replace `OnUnitActiveSec=` with `OnCalendar=`.
"""
created_at = 1780031840
updated_at = 1780031840

