[nodes.r2-wrong-token-type]
kind = "Gotcha"
title = "R2 401: generic Cloudflare API token used in place of R2 S3 token"
body = """
The Cloudflare dashboard exposes two unrelated credential types that both look like "API tokens" but only one works at the S3-compatible R2 endpoint:

- **R2 S3 token** — created at *R2 → Manage R2 API Tokens → Create API Token*. Produces an **Access Key ID** (32-char hex) + **Secret Access Key** (64-char lowercase hex, it's a SHA-256). This is the only credential that authenticates against `<account>.r2.cloudflarestorage.com`.
- **Generic Cloudflare API token** — created at *My Profile → API Tokens*. A single 40–53-char string (often starts with `cfat...`). Authenticates against `api.cloudflare.com/...` only.

**Why:** Symptom is `401 Unauthorized` (code: `Unauthorized`) on every operation — list-buckets, put-object, get-object alike. aws-sdk-s3 surfaces it as `unhandled error (Unauthorized)` with no hint. `curl --aws-sigv4` signs the request happily (the sigv4 maths don't care that the secret isn't the right *kind* of secret) and R2 still returns 401. Easy to misdiagnose as a bucket-permission or SDK-checksum issue.

**How to apply:** First triage step on any R2 401 is to check `wc -c` on the secret. 64 chars lowercase hex → right token type, look at bucket scoping next. Any other length / non-hex chars → wrong token type, regenerate via the R2-specific page. Don't trust the dashboard UI labels — both flows say "API Token".
"""
created_at = 1780029883
updated_at = 1780029883

