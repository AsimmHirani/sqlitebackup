[nodes.pipeline]
kind = "Component"
title = "Backup + restore + list pipelines (single bundled object per backup)"
body = """
Single binary, three subcommands (plus a `backup --install-systemd <INTERVAL>` install path that writes a systemd timer instead of running a backup — see [[systemd-install-shape]]). Each backup is ONE encrypted S3 object — see [[bundled-tar-payload]].

Project identity is the tuple `(name, metadata, db_path)`; the S3 prefix is `{name}-{metadata}`. See [[identity-name-and-metadata]] for the human-suffix design; the toml is no longer in a separate plaintext sidecar — it's bundled inside the encrypted backup blob.

## `sqlitebackup backup [--force]`

1. Compute prefix from (name, metadata).
2. Identity check: list_objects in the prefix, find the lex-greatest `.tar.gz.enc`. If empty → first backup, proceed. If present → fetch + decrypt with current passphrase + AAD=prefix; if decrypt fails (wrong passphrase, AAD mismatch, corrupt blob) → refuse, even with `--force`. With `--force`: stop after successful decrypt (passphrase verified). Without `--force`: untar, parse the embedded backup.toml, compare identity tuple; refuse on mismatch.
3. Spawn `sqlite3 <db_path> .dump`, read stdout to bytes (no streaming through gzip in the new layout — bundling needs the SQL as a discrete tar entry).
4. tar = {`backup.toml` entry + `dump.sql` entry}; gzip the tar.
5. random_bytes(16) for Argon2id salt; PasswordKey::derive with deaddrop-crypto defaults.
6. encrypt_chunk(&prefix, 0, &gz) — AAD binds the bundle to the full prefix ([[aad-bound-to-name]]).
7. Pack ISBK1 envelope ([[isbk1-envelope]]).
8. PutObject at `{prefix}/{ISO-8601 UTC, ms precision}.tar.gz.enc`. Millisecond precision prevents same-second collision into an Object-Lock-locked key ([[object-lock-compat]]).

## `sqlitebackup restore [--key K] [--output PATH] [--config-out PATH]`

1. Compute prefix. Resolve S3 key: explicit `--key`, or list_objects_v2(prefix="{prefix}/") and pick the lex-greatest `.tar.gz.enc` ([[restore-latest-by-lex-sort]]).
2. GetObject → parse envelope → derive Argon2id key with *stored* params (so backups taken under older params still open) → decrypt_chunk → gunzip → untar.
3. Write `dump.sql` to `--output` (default `-` = stdout, pipe into `sqlite3 newdb.db`).
4. If `--config-out PATH` set: also write the recovered `backup.toml`. Disaster recovery: `restore -o foo.sql --config-out backup.toml.recovered`.

## `sqlitebackup list`

1. list_objects_v2 with delimiter='/' to enumerate top-level common prefixes.
2. For each prefix, count `.tar.gz.enc` siblings + find lex-greatest timestamp.
3. Print `prefix / backups: N (latest TS)`. **No decryption, no passphrase required** — only what S3 metadata reveals. The prefix already encodes name + metadata in plaintext (unavoidable; S3 keys are not encrypted), so list is essentially "what's in the bucket" without unlocking. Operators needing the encrypted-only fields (db_path, future toml fields) get them via `restore --config-out`.

Whole pipeline buffers in RAM at every step ([[in-memory-only]]).
"""
created_at = 1779946335
updated_at = 1780035355

