[nodes.object-lock-compat]
kind = "Decision"
title = "Object Lock compat: never overwrite, ms-precision timestamps, one bundled blob per backup"
body = """
The bucket has two operator-set rules:
- *Object Lock retention:* uploaded objects are immutable for 90 days (no overwrite, no delete).
- *Lifecycle:* objects older than 120 days are deleted.

The pipeline is designed so every backup writes a *fresh* key, never an overwrite. Each backup is a single object at `{prefix}/{ISO-8601 UTC, ms precision}.tar.gz.enc`. The earlier two-object design (separate `_config.toml` sidecar) was retired ([[bundled-tar-payload]]) — partly because every config re-upload would have hit the lock on subsequent backups, partly because the plaintext sidecar leaked metadata.

**Why:**
- Millisecond precision in the timestamp keeps lex order intact (`.000Z < .500Z` within a second, integer-second field dominates across seconds) while making same-second collisions essentially impossible (a backup takes ~hundreds of ms of Argon2 derive alone, so two backups will be well over 1ms apart in practice).
- Lex-sort on ISO-8601 keys is the same trick we already use for picking the latest backup ([[restore-latest-by-lex-sort]]); zero new infra.
- A project that hasn't been backed up in >120d disappears from the bucket entirely (all its blobs lifecycled out). That's correct behavior: a stale backup graveyard is worse than no entry, and the retention contract is "120 days of history."

**How to apply:**
- Never PutObject to an existing key. If we ever need to update something (e.g. mark a backup verified), use a fresh `{ts}` not the original.
- The 90d Object Lock prevents `delete-and-replace` recovery from a corrupt blob within its retention window — there is no "rewrite this entry" escape hatch. If a malformed blob is uploaded, the only fix is to wait it out (or take a new backup, which writes a fresh blob that becomes the latest).
- Same-second collision protection is statistical, not absolute. If you ever need bulk-parallel backups against the same prefix, switch to nanosecond precision (`%.9f`) or append a random suffix.
- Stray non-`.tar.gz.enc` files from older code versions are orphans — `latest_backup_key`'s filter ignores them; they sit until lifecycle takes them in <=120d. Don't write a migration that tries to delete them — the 90d lock probably still blocks.
"""
created_at = 1780032502
updated_at = 1780035377

