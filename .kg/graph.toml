[nodes.restore-latest-by-lex-sort]
kind = "Decision"
title = "Restore default = lex-greatest object under {name}/"
body = """
When `restore` is invoked without `--key`, list objects under prefix `{name}/`, filter to `*.sql.gz.enc`, and pick the lex-greatest key.

**Why:** Backup keys are `{prefix}/{ISO-8601 UTC, ms precision}.tar.gz.enc` (see [[bundled-tar-payload]]). ISO-8601 timestamps sort correctly *lexically* (`2026-05-28T...` > `2026-05-27T...`), so `max()` over the string keys yields the newest backup — no need to inspect LastModified, parse timestamps, or fetch HEAD metadata for each object. Listing is one round-trip; sorting is in-memory.

**How to apply:** If you ever change the backup key format (e.g. add a hostname prefix, switch to epoch ms), reconfirm lex-sort still yields chronological order. If it doesn't, fall back to LastModified or parse the timestamp out of the key explicitly. Don't trust the order returned by S3 — it's documented as undefined.
"""
created_at = 1779985620
updated_at = 1780035400

