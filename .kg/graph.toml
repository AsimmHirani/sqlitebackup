[nodes.identity-name-and-metadata]
kind = "Decision"
title = "Project identity = (name, metadata) human suffix; toml bundled inside the backup blob"
body = """
Identity is the tuple `(name, metadata)`. The S3 prefix is `{name}-{metadata}`; `metadata` is a human-meaningful disambiguator the operator chooses by convention `{service}-{env}-{host}`. The local `backup.toml` is bundled inside every encrypted backup blob ([[bundled-tar-payload]]) so it can be recovered via `restore --config-out`.

**Why:** Three real problems surfaced after the first live R2 test:

1. *Name collisions.* A single `name` field across multiple enrolled projects is one typo away from two projects clobbering each other in the bucket. UUIDs solve uniqueness but become unrecoverable opaque tokens if the local `backup.toml` is lost.
2. *Disaster recovery from `backup.toml` loss.* The local TOML carries identity + bucket info; without it, the operator has to manually reconstruct everything from memory. Bundling the toml inside the encrypted blob reduces the recovery-required info to: bucket + R2 account + passphrase.
3. *Discoverability.* Operators looking at the bucket should be able to tell what's there. The prefix is observable (S3 keys can't be encrypted), so `list` works without decryption — db_path / future toml fields stay confidential behind the AEAD boundary.

**How to apply:** `metadata` is required in any new backup.toml — don't ship a fallback that uses just `name`. Uniqueness is operator discipline, not tool-enforced — but the soft-check ([[bundled-tar-payload]] for the decrypt-then-compare semantics) catches accidental collisions at first PutObject, not after data has been written. The prefix encodes name + metadata in plaintext on purpose; if your threat model needs prefix opacity, you'd need to switch to UUIDs and lose disaster recoverability.
"""
created_at = 1780031351
updated_at = 1780035365

