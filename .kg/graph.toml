symbol = "main"

[nodes.bundled-tar-payload]
kind = "Decision"
title = "Single .tar.gz.enc per backup (bundles dump.sql + backup.toml); --force preserves passphrase check"
body = """
Each backup is one S3 object: a tar of two entries (`backup.toml`, `dump.sql`), gzipped + AES-GCM encrypted under AAD=prefix, wrapped in the ISBK1 envelope. Restore decrypts + untars; `--config-out PATH` writes the recovered backup.toml. `list` reads only S3 metadata — never decrypts.

Replaces the prior two-object layout (`{ts}.sql.gz.enc` data + `_config-{ts}.toml` plaintext sidecar). Three things change:

1. *Sidecar confidentiality.* The toml carried `db_path` (and any future fields) — readable by anyone with bucket-read access. Bundling moves it behind the AEAD boundary; the only metadata still visible from S3 alone is the prefix `{name}-{metadata}` and the backup timestamps.
2. *Half the object count.* One PutObject per backup instead of two. Half the Object Lock entries, half the lifecycle deletes, half the API calls.
3. *--force preserves passphrase agreement.* The identity check now requires decrypting the latest existing blob with the current passphrase. `--force` skips the *identity tuple comparison* but the decryption still runs. If the prefix's previous backups were encrypted under a different passphrase, the AEAD tag fails and `--force` refuses. This is the explicit semantic the user asked for: "if --force is issued, also force the same password."

**Why:**
- A bucket reader without the passphrase shouldn't learn what database is being backed up. The prefix leaks `name + metadata` (operator-chosen, intentionally human-meaningful), but `db_path` is a real path on the operator's infrastructure and should be confidential.
- Halving object count compounds across N projects + M months of retention — meaningfully cuts bucket inventory and per-request costs.
- The "force same passphrase" property comes for free once the identity check requires decryption; no separate enforcement code.

**How to apply:**
- Bundle entries are `backup.toml` and `dump.sql` (literal names). Unbundle ignores other entries for forward-compat — if you add a third entry (signed digest? compressed sql?), don't break that contract.
- The tar entry order is `backup.toml` first, `dump.sql` second. This is intentional: a future optimization could partial-decrypt the gunzipped tar to extract only the toml for `list` summarization. AES-GCM doesn't support partial decryption today, but if the bundle ever ungets the tag from the body (i.e. we move to a streaming AEAD), the ordering matters.
- `--force` skips identity compare but NOT passphrase check. If you ever add `--force-passphrase` (override even decryption failure), gate it behind a louder confirmation — it would let an operator overwrite a prefix whose history they cannot read, leaving a permanently-broken timeline.
- Backups are sized by the full bundle (a few hundred bytes for the toml + the SQL dump). Don't gzip the toml separately and bundle the .toml.gz — gzip a tar of plaintext beats two-pass gzipping each entry, and keeps the tar inspectable with `tar tvf` after manual decrypt.
"""
created_at = 1780035398
updated_at = 1780035398

